<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#022c22" />
      <stop offset="100%" stop-color="#064e3b" />
    </linearGradient>
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b" />
      <stop offset="50%" stop-color="#d97706" />
      <stop offset="100%" stop-color="#b45309" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#000000" flood-opacity="0.5" />
    </filter>
  </defs>

  <!-- Background Shield -->
  <rect width="512" height="512" rx="128" fill="url(#bg-grad)" />

  <!-- Outer Ring -->
  <circle cx="256" cy="256" r="210" fill="none" stroke="url(#gold-grad)" stroke-width="8" opacity="0.8" />
  
  <!-- Compass Tick Marks -->
  <g stroke="url(#gold-grad)" stroke-width="4" opacity="0.6">
    <line x1="256" y1="26" x2="256" y2="40" />
    <line x1="256" y1="472" x2="256" y2="486" />
    <line x1="26" y1="256" x2="40" y2="256" />
    <line x1="472" y1="256" x2="486" y2="256" />
  </g>

  <!-- Central Africa / Congo Map Highlight -->
  <g filter="url(#shadow)">
    <!-- Stylized representation of the Kongo shield / Map contour -->
    <path d="M 220,180 
             Q 260,160 300,190 
             Q 340,220 310,260 
             Q 280,300 290,340 
             Q 260,360 230,320 
             Q 200,280 190,240 
             Q 180,200 220,180 Z" 
          fill="url(#gold-grad)" opacity="0.2" />
  </g>

  <!-- Compass Star (Premium Gold Emblem) -->
  <g filter="url(#shadow)">
    <!-- Main Vertical Star Point -->
    <path d="M 256,100 L 272,240 L 256,256 L 240,240 Z" fill="url(#gold-grad)" />
    <!-- Main Horizontal Star Point -->
    <path d="M 100,256 L 240,240 L 256,256 L 240,272 Z" fill="url(#gold-grad)" />
    <!-- Bottom Vertical Star Point -->
    <path d="M 256,412 L 272,272 L 256,256 L 240,272 Z" fill="url(#gold-grad)" />
    <!-- Right Horizontal Star Point -->
    <path d="M 412,256 L 272,240 L 256,256 L 272,272 Z" fill="url(#gold-grad)" />
    
    <!-- Diagonal Points (Slightly Smaller) -->
    <path d="M 170,170 L 244,244 L 256,256 L 236,252 Z" fill="url(#gold-grad)" opacity="0.8" />
    <path d="M 342,170 L 268,244 L 256,256 L 276,252 Z" fill="url(#gold-grad)" opacity="0.8" />
    <path d="M 170,342 L 244,268 L 256,256 L 236,260 Z" fill="url(#gold-grad)" opacity="0.8" />
    <path d="M 342,342 L 268,268 L 256,256 L 276,260 Z" fill="url(#gold-grad)" opacity="0.8" />
  </g>

  <!-- Inner Gold Ring -->
  <circle cx="256" cy="256" r="40" fill="none" stroke="url(#gold-grad)" stroke-width="3" opacity="0.9" />

  <!-- Center Jewel -->
  <circle cx="256" cy="256" r="14" fill="#10b981" />
  <circle cx="254" cy="254" r="5" fill="#ffffff" opacity="0.6" />

  <!-- Star Highlights -->
  <circle cx="256" cy="100" r="4" fill="#ffffff" opacity="0.8" />
  <text x="256" y="85" font-family="Hanken Grotesk, system-ui, sans-serif" font-weight="900" font-size="24" fill="url(#gold-grad)" text-anchor="middle">N</text>
</svg>
